<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="xcg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e6422a"/>
      <stop offset="55%" stop-color="#ee6c30"/>
      <stop offset="100%" stop-color="#f5a23a"/>
    </linearGradient>
    <linearGradient id="xcg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e6422a"/>
      <stop offset="55%" stop-color="#ee6c30"/>
      <stop offset="100%" stop-color="#f5a23a"/>
    </linearGradient>
  </defs>
  <!-- Two flowing strokes that cross near center to form a hand-drawn X.
       Stroke 1 (top-left -> bottom-right): slight S-curve so it doesn't look like a math axis. -->
  <path d="M 11 9 C 22 18, 30 26, 32 32 C 34 38, 42 46, 53 55"
        fill="none" stroke="url(#xcg)" stroke-width="9" stroke-linecap="round"/>
  <!-- Stroke 2 (top-right -> bottom-left): mirrored S-curve. -->
  <path d="M 53 9 C 42 18, 34 26, 32 32 C 30 38, 22 46, 11 55"
        fill="none" stroke="url(#xcg2)" stroke-width="9" stroke-linecap="round"/>
</svg>
